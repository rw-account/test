{% extends 'base.html' %}
{% block title %}ادارة المخازن - الصفحة الرئيسية{% endblock %}
{% block style %}
<style>
  .hero-section {
    /* ضع رابط صورتك هنا */
    background-image: url("{{ url_for('static', filename='images/HeroImage.png') }}");
    /* تغطي كل مساحة القسم */
    background-size: cover;
    /* الجزء المهم في الوسط */
    background-position: center;
    width: 100%;
    /* ارتفاع القسم 80% من الشاشة */
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    position: relative;
  }

  .hero-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* طبقة شفافة لتوضيح النص */
    background-color: rgba(0, 0, 0, 0.4);
  }

  .hero-content {
    position: relative;
    z-index: 2;
  }

  @media (max-width: 768px) {
    .hero-section {
      /* تقليل ارتفاع الهواتف */
      height: 60vh;
    }
  }
    </style>
{% endblock %}
{% block body %}

<section class="hero-section">
  <div class="hero-overlay"></div>
  <div class="hero-content container">
    <h1 class="display-4 fw-bold">مرحبا بك في نظام إدارة المخازن</h1>
    <p class="lead mb-4 ">نظام الكتروني حديث وآمن لإدارة المخازن.</p>
  </div>
</section>

{% endblock %}
